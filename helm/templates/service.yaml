{{- if .Values.service.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "oracle-explorer.fullname" . }}
  labels:
    {{- include "oracle-explorer.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    {{- range .Values.service.ports }}
    - port: {{ .port }}
      targetPort: {{ .portName }}
      protocol: {{ .protocol }}
      name: {{ .portName }}
    {{- end }}
  selector:
    {{- include "oracle-explorer.selectorLabels" . | nindent 4 }}
{{- end }}
