{{- if .Values.gcpSecrets.enabled }}
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: {{ .Values.gcpSecrets.secretStore.name }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  provider:
    gcpsm:
      projectID: {{ .Values.gcpSecrets.projectId }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.gcpSecrets.externalSecret.name }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: {{ .Values.gcpSecrets.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.gcpSecrets.secretStore.name }}
    kind: SecretStore
  target:
    name: {{ .Values.envFromSecret.secretName }}
  dataFrom:
    - extract:
        key: {{ .Values.gcpSecrets.externalSecret.secretPath }}
{{- end }}

{{- range .Values.keystoreSecrets }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .secretName }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: "24h"
  secretStoreRef:
    name: oracle-explorer-keystore-store
    kind: SecretStore
  target:
    name: {{ .secretName }}
  data:
    - secretKey: keystore
      remoteRef:
        key: {{ .secretName }}
        decodingStrategy: None
{{- end }}

{{- if .Values.keystoreSecrets }}
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: oracle-explorer-keystore-store
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  provider:
    gcpsm:
      projectID: prod-pragma
{{- end }}
